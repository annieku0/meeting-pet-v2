<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synko — Slack Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="slack.css?v=5" />
</head>
<body>

<div class="slack-workspace">

  <!-- ── Sidebar ── -->
  <aside class="slack-sidebar">
    <div class="workspace-header">
      <div class="workspace-name">Synko Test Co.</div>
      <div class="workspace-status">
        <div class="status-dot"></div>
        <span>you</span>
      </div>
    </div>

    <!-- Search -->
    <div class="sidebar-search">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden>
        <circle cx="9" cy="9" r="6" />
        <path d="M14 14l4 4" />
      </svg>
      <span>Search Synko Test Co.</span>
    </div>

    <!-- Utility links -->
    <div class="sidebar-utility">
      <div class="util-row"><span class="util-icon">🧵</span> Threads</div>
      <div class="util-row"><span class="util-icon">✎</span> Drafts &amp; sent</div>
      <div class="util-row"><span class="util-icon">@</span> Mentions &amp; reactions</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">
        <span class="caret">▾</span> Channels
      </div>
      <div class="channel-item active" data-channel="general">
        <span class="ch-hash">#</span> general
      </div>
      <div class="channel-item" data-channel="marketing">
        <span class="ch-hash">#</span> marketing
        <span class="unread"></span>
      </div>
      <div class="channel-item" data-channel="design">
        <span class="ch-hash">#</span> design
      </div>
      <div class="channel-item" data-channel="dev">
        <span class="ch-hash">#</span> dev
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">
        <span class="caret">▾</span> Direct messages
      </div>
      <div class="channel-item" data-channel="dm-lesley">
        <div class="online-dot"></div>
        Lesley
      </div>
      <div class="channel-item" data-channel="dm-steve">
        <div class="online-dot" style="background:var(--yellow)"></div>
        Steve
      </div>
      <div class="channel-item" data-channel="dm-alex">
        <div class="online-dot" style="background:var(--dim)"></div>
        Alex
      </div>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <div class="slack-main">
    <div class="channel-header">
      <div class="ch-header-left">
        <button class="ch-header-title">
          <span class="ch-header-name" id="channel-header-name"># general</span>
          <svg width="11" height="11" viewBox="0 0 20 20" fill="currentColor" aria-hidden><path d="M5 8l5 5 5-5z"/></svg>
        </button>
        <p class="ch-header-topic" id="channel-header-topic">Team announcements and general chat</p>
      </div>
      <div class="ch-header-actions">
        <button title="Members"><svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" aria-hidden><circle cx="7" cy="7" r="3"/><circle cx="14" cy="8" r="2.5"/><path d="M2 17c0-3 2.5-5 5-5s5 2 5 5zM12 17c0-2.4 1.5-4 4-4s2 1.6 2 4z"/></svg><span>3</span></button>
        <button title="Pinned"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden><path d="M14 3l3 3-4 1-2 5h-1L7 8H5l1-2 5-2 1-1z"/><path d="M9 11l-4 5"/></svg></button>
        <button title="Search"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden><circle cx="9" cy="9" r="6"/><path d="M14 14l4 4"/></svg></button>
        <button title="Channel info"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden><circle cx="10" cy="10" r="8"/><path d="M10 9v5M10 6.5v.5"/></svg></button>
      </div>
    </div>

    <div class="messages-area" id="messages-area"></div>

    <div class="message-composer">
      <div class="composer-inner">
        <input class="composer-input" id="composer-input"
               placeholder="Message #general" autocomplete="off" />
        <button class="btn-send" id="btn-send" aria-label="Send">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" aria-hidden><path d="M3 3l14 7-14 7v-5l9-2-9-2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Pet assistant ── -->
<div class="pet-assistant" id="pet-assistant">
  <!-- Notification panel (above the pet) -->
  <div class="pet-notification hidden" id="pet-notification">
    <div class="notif-header">✦ PET SUGGESTION</div>
    <div class="notif-type-badge" id="notif-type-badge">VAGUE COMMITMENT</div>
    <div class="notif-label">ORIGINAL</div>
    <div class="notif-original" id="notif-original"></div>
    <div class="notif-label">TRY THIS INSTEAD</div>
    <div class="notif-suggestion" id="notif-suggestion"></div>
    <div class="notif-actions">
      <button class="btn-use-suggestion" id="btn-use-suggestion">USE THIS</button>
      <button class="btn-dismiss-notif" id="btn-dismiss-notif">DISMISS</button>
    </div>
  </div>

  <!-- Pet sprite -->
  <div class="pet-bubble" id="pet-bubble" title="Your collaboration pet">
    <canvas id="slack-pet-canvas" width="48" height="48"></canvas>
    <div class="pet-label" id="pet-label"></div>
  </div>
</div>

<script src="pets.js?v=18"></script>
<script src="slack.js?v=8"></script>
</body>
</html>
