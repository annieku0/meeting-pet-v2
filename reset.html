<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Synko — Reset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    .box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .title {
      font-family: var(--pixelify);
      font-size: 24px; font-weight: 700;
      color: var(--text); letter-spacing: 0.5px;
    }
    .sub {
      font-size: 14px; color: var(--text-dim); line-height: 1.5;
    }
    .btn {
      background: var(--red); color: #ffffff; border: none;
      font-family: var(--pixelify); font-weight: 700; font-size: 15px;
      padding: 12px 20px; cursor: pointer; border-radius: 6px;
      width: 100%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      transition: background 0.1s, transform 0.05s;
    }
    .btn:hover { filter: brightness(0.95); transform: translateY(-1px); }
    .btn-cancel {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      font-family: var(--pixelify); font-weight: 500;
      font-size: 14px; padding: 11px; cursor: pointer; width: 100%;
      border-radius: 6px;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn-cancel:hover { background: var(--bg2); border-color: var(--text-dim); }
    .done { font-size: 14px; color: var(--green); font-weight: 600; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:48px">🐾</div>
    <div class="title">Reset Synko</div>
    <div class="sub">
      This will clear all pets, sessions, and meeting data so you can start fresh from the beginning.
    </div>
    <button class="btn" id="btn-reset">Reset Everything</button>
    <button class="btn-cancel" onclick="history.back()">← Cancel</button>
    <div class="done" id="done-msg">✓ Done! You can close this tab.</div>
  </div>
  <script>
    document.getElementById('btn-reset').addEventListener('click', () => {
      localStorage.clear();
      document.getElementById('btn-reset').style.display = 'none';
      document.getElementById('done-msg').style.display = 'block';
      setTimeout(() => { window.location.href = 'popup.html'; }, 1500);
    });
  </script>
</body>
</html>
